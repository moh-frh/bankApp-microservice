spring.application.name=config-service
server.port=9999

# GitHub remote config repo
spring.cloud.config.server.git.uri=https://github.com/mohamedYoussfi/bank-account-config-repo
#spring.cloud.config.server.git.uri=https://github.com/moh-frh/bankApp-microservice/tree/master/config-repo
spring.cloud.config.server.git.default-label=main
spring.cloud.config.server.git.clone-on-start=true

# Eureka - use container name instead of localhost
eureka.client.service-url.defaultZone=${DISCOVERY_SERVICE_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true